<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinclair ZX Spectrum Tribute - La Evolución Completa</title>
    <style>
        body {
            margin: 0; padding: 0; background: #000; color: #0f0; font-family: 'Courier New', monospace;
            text-align: center; padding-bottom: 50px;
        }
        #container {
            max-width: 850px; margin: 0 auto; padding: 20px;
        }
        .img-container {
            height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        img {
            max-height: 100%; max-width: 100%; height: auto; border: 4px solid #ff0; image-rendering: pixelated;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }
        .info {
            margin: 20px auto; padding: 15px; background: rgba(0,255,0,0.1); border: 2px solid #0f0;
            max-width: 750px; font-size: 16px; line-height: 1.5; text-align: left;
        }
        .info strong { color: #ff0; font-size: 20px; display: block; margin-bottom: 8px; text-align: center;}
        h1 { color: #ff0; text-shadow: 0 0 10px #ff0; margin-bottom: 5px; }
        button {
            background: #000; color: #0f0; border: 2px solid #0f0; padding: 12px 25px;
            font-size: 18px; cursor: pointer; margin: 10px; font-family: 'Courier New', monospace;
            font-weight: bold;
        }
        button:hover { background: #0f0; color: #000; }
        .progress-container { width: 100%; background: #222; height: 8px; margin: 15px 0; border-radius: 4px; overflow: hidden; }
        .progress { height: 100%; background: linear-gradient(to right, #f00, #ff0, #0f0, #00f); width: 0%; transition: width 0.1s linear; }
        .tech-data { color: #0ff; margin-top: 5px; font-size: 14px; }
        .curiosity { color: #ff8800; margin-top: 8px; font-style: italic; font-size: 14px; }
    </style>
</head>
<body>
    <div id="container">
        <h1>SINCLAIR ZX SPECTRUM RETRO SHOW</h1>
        <p style="color:#aaa; margin-top: 0;">La evolución de un mito • Pase automático cada 10 segundos</p>
        
        <div id="display">
            <div class="img-container">
                <img id="computer-img" src="https://upload.wikimedia.org/wikipedia/commons/1/1b/Sinclair_ZX80.jpg" alt="ZX80">
            </div>
            <div class="info" id="info-text">
                <strong>ZX80 (1980)</strong>
                Presiona "INICIAR SHOW RETRO" para comenzar el viaje por la historia de Sinclair.
            </div>
        </div>
        
        <div class="progress-container">
            <div class="progress" id="progress"></div>
        </div>
        
        <button onclick="startShow()">▶ INICIAR SHOW</button>
        <button onclick="stopShow()">⏹ DETENER</button>
    </div>

    <audio id="audio0" src="https://archive.org/download/zx81-sound-effects/SpectrumLoading.mp3" preload="auto"></audio>
    <audio id="audio1" src="https://archive.org/download/zx81-sound-effects/SpectrumLoading.mp3" preload="auto"></audio>
    <audio id="audio2" src="https://archive.org/download/manic-miner-theme/Manic%20Miner%20Theme.mp3" preload="auto"></audio>
    <audio id="audio3" src="https://archive.org/download/ay-music-collection/Chronos.mp3" preload="auto"></audio>
    <audio id="audio4" src="https://archive.org/download/ay-music-collection/Robocop.mp3" preload="auto"></audio>
    <audio id="audio5" src="https://archive.org/download/ay-music-collection/Robocop.mp3" preload="auto"></audio>

    <script>
        const computers = [
            {
                img: "https://upload.wikimedia.org/wikipedia/commons/1/1b/Sinclair_ZX80.jpg",
                title: "ZX80 (1980) - El Origen",
                tech: "Z80A @ 3.25 MHz | 1 KB RAM (ampliable a 16 KB) | Vídeo Monocromo.",
                curiosity: "Curiosidad: Fue la primera computadora en romper la barrera de las 100 libras en el Reino Unido. La pantalla parpadeaba cada vez que presionabas una tecla porque la CPU compartía el procesado de datos y de vídeo.",
                audio: 0
            },
            {
                img: "https://upload.wikimedia.org/wikipedia/commons/0/0f/Sinclair_ZX81.jpg",
                title: "ZX81 (1981) - El Éxito Masivo",
                tech: "Z80A @ 3.25 MHz | 1 KB RAM | Modo 'SLOW' incorporado.",
                curiosity: "Curiosidad: Redujo el diseño del ZX80 a solo 4 chips principales gracias a un chip Uncommitted Logic Array (ULA) personalizado. Aquí nació el mítico juego '3D Monster Maze', considerado el primer survival horror de la historia.",
                audio: 1
            },
            {
                img: "https://upload.wikimedia.org/wikipedia/commons/0/03/ZXSpectrum48k.jpg",
                title: "ZX Spectrum 48K (1982) - La Leyenda del Arcoíris",
                tech: "Z80A @ 3.5 MHz | 48 KB RAM | Gráficos a color (8 colores) | Altavoz interno 'Beeper'.",
                curiosity: "Curiosidad: Sus famosas teclas de goma se ganaron el apodo de 'teclas de carne muerta'. El 'Attribute Clash' (conflicto de color por bloques de 8x8 píxeles) se convirtió en su firma visual icónica. Música: ¡El inmortal Manic Miner!",
                audio: 2
            },
            {
                img: "https://upload.wikimedia.org/wikipedia/commons/c/ce/ZX_Spectrum_128k.jpg",
                title: "ZX Spectrum 128 (1985) - El Canto de Cisne de Sinclair",
                tech: "Z80A @ 3.54 MHz | 128 KB RAM | Chip de sonido AY-3-8912 (3 canales) | Radiador lateral.",
                curiosity: "Curiosidad: Conocido cariñosamente como 'el modelo del radiador' debido al enorme disipador negro en su lateral derecho. Desarrollado en gran parte en España por Investrónica debido a regulaciones del mercado español.",
                audio: 3
            },
            {
                img: "https://upload.wikimedia.org/wikipedia/commons/a/a7/ZX_Spectrum_%2B2.jpg",
                title: "ZX Spectrum +2 (1986) - La Era Amstrad",
                tech: "Z80A @ 3.54 MHz | 128 KB RAM | Grabadora de casete ('Datacorder') integrada | Dos puertos de Joystick.",
                curiosity: "Curiosidad: Tras comprar la marca Sinclair, Amstrad lanzó este modelo añadiendo un teclado mecánico real y la casetera integrada, imitando la fórmula exitosa de su línea Amstrad CPC.",
                audio: 4
            },
            {
                img: "https://upload.wikimedia.org/wikipedia/commons/0/0e/ZX_Spectrum_Plus3.jpeg",
                title: "ZX Spectrum +3 (1987) - El Broche de Oro",
                tech: "Z80A @ 3.54 MHz | 128 KB RAM | Disquetera de 3 pulgadas integrada | Sistema Operativo +3DOS.",
                curiosity: "Curiosidad: Abandonó el casete por los discos de 3 pulgadas (formato propietario de Amstrad). Fue tan avanzado que permitía cargar el sistema operativo profesional CP/M, transformando una máquina de juegos en una de oficina.",
                audio: 5
            }
        ];

        let current = 0;
        let mainInterval = null;
        let progressInterval = null;
        let progressTime = 0;
        const durationPerModel = 10000; // 10 segundos por modelo
        const audios = document.querySelectorAll('audio');

        function showComputer(index) {
            current = index;
            const c = computers[current];
            
            // Actualizar interfaz
            document.getElementById('computer-img').src = c.img;
            document.getElementById('computer-img').alt = c.title;
            document.getElementById('info-text').innerHTML = `
                <strong>${c.title}</strong>
                <div class="tech-data"><strong>Especificaciones:</strong> ${c.tech}</div>
                <div class="curiosity">${c.curiosity}</div>
            `;
            
            // Control de audio dinámico
            audios.forEach(a => { a.pause(); a.currentTime = 0; });
            const currentAudio = document.getElementById(`audio${c.audio}`);
            if (currentAudio) {
                currentAudio.play().catch(e => console.log("Audio bloqueado por el navegador hasta interacción: ", e));
            }
        }

        function startShow() {
            stopShow();
            showComputer(0);
            
            // Intervalo para cambiar de ordenador
            mainInterval = setInterval(() => {
                current = (current + 1) % computers.length;
                showComputer(current);
                progressTime = 0;
            }, durationPerModel);

            // Intervalo suave para la barra de progreso
            progressTime = 0;
            progressInterval = setInterval(() => {
                progressTime += 100;
                let percentage = (progressTime / durationPerModel) * 100;
                document.getElementById('progress').style.width = percentage + '%';
            }, 100);
        }

        function stopShow() {
            clearInterval(mainInterval);
            clearInterval(progressInterval);
            document.getElementById('progress').style.width = '0%';
            audios.forEach(a => { a.pause(); a.currentTime = 0; });
        }
    </script>
</body>
</html>
