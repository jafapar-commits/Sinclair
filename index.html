<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinclair ZX Spectrum Tribute - Evolución Corregida</title>
    <style>
        body {
            margin: 0; padding: 0; background: #000; color: #0f0; font-family: 'Courier New', monospace;
            text-align: center; padding-bottom: 50px;
        }
        #container {
            max-width: 850px; margin: 0 auto; padding: 20px;
        }
        .img-container {
            height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            background: #111;
            border: 4px solid #ff0;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }
        img {
            max-height: 100%; max-width: 100%; height: auto; image-rendering: pixelated;
        }
        .info {
            margin: 20px auto; padding: 15px; background: rgba(0,255,0,0.1); border: 2px solid #0f0;
            max-width: 750px; font-size: 16px; line-height: 1.5; text-align: left;
        }
        .info strong { color: #ff0; font-size: 20px; display: block; margin-bottom: 8px; text-align: center;}
        h1 { color: #ff0; text-shadow: 0 0 10px #ff0; margin-bottom: 5px; }
        button {
            background: #000; color: #0f0; border: 2px solid #0f0; padding: 12px 25px;
            font-size: 18px; cursor: pointer; margin: 10px; font-family: 'Courier New', monospace;
            font-weight: bold;
        }
        button:hover { background: #0f0; color: #000; }
        .progress-container { width: 100%; background: #222; height: 8px; margin: 15px 0; border-radius: 4px; overflow: hidden; }
        .progress { height: 100%; background: linear-gradient(to right, #f00, #ff0, #0f0, #00f); width: 0%; }
        .tech-data { color: #0ff; margin-top: 5px; font-size: 14px; }
        .curiosity { color: #ff8800; margin-top: 8px; font-style: italic; font-size: 14px; }
    </style>
</head>
<body>
    <div id="container">
        <h1>SINCLAIR ZX SPECTRUM RETRO SHOW</h1>
        <p style="color:#aaa; margin-top: 0;">Audio e imágenes 100% garantizados • Cambio cada 10 segundos</p>
        
        <div id="display">
            <div class="img-container">
                <img id="computer-img" src="https://images.unsplash.com/photo-1547082299-de196ea013d6?w=600&auto=format&fit=crop" alt="Cargando...">
            </div>
            <div class="info" id="info-text">
                <strong>Bienvenido al Show de Sinclair</strong>
                Presiona "INICIAR SHOW RETRO" para forzar la activación de audio y comenzar el recorrido con imágenes estables.
            </div>
        </div>
        
        <div class="progress-container">
            <div class="progress" id="progress"></div>
        </div>
        
        <button onclick="startShow()">▶ INICIAR SHOW RETRO</button>
        <button onclick="stopShow()">⏹ DETENER</button>
    </div>

    <script>
        // Repositorio de imágenes alternativas estables y directas (no se rompen)
        const computers = [
            {
                img: "https://upload.wikimedia.org/wikipedia/commons/1/1b/Sinclair_ZX80.jpg",
                title: "ZX80 (1980) - El Origen",
                tech: "Z80A @ 3.25 MHz | 1 KB RAM | Vídeo Monocromo.",
                curiosity: "Curiosidad: La pantalla parpadeaba al pulsar teclas porque la CPU compartía el procesado de datos y de vídeo.",
                audioType: "load"
            },
            {
                img: "https://upload.wikimedia.org/wikipedia/commons/3/33/ZX81_Computer.jpg",
                title: "ZX81 (1981) - El Éxito Masivo",
                tech: "Z80A @ 3.25 MHz | 1 KB RAM | Chip ULA integrado.",
                curiosity: "Curiosidad: Redujo el diseño a solo 4 chips. Aquí nació el mítico juego '3D Monster Maze', primer survival horror.",
                audioType: "load"
            },
            {
                img: "https://upload.wikimedia.org/wikipedia/commons/0/03/ZXSpectrum48k.jpg",
                title: "ZX Spectrum 48K (1982) - La Leyenda del Arcoíris",
                tech: "Z80A @ 3.5 MHz | 48 KB RAM | Gráficos a color (Attribute Clash).",
                curiosity: "Curiosidad: Sus famosas teclas de goma se ganaron el apodo de 'teclas de carne muerta'. ¡Sonando Manic Miner!",
                audioType: "game1"
            },
            {
                img: "https://upload.wikimedia.org/wikipedia/commons/c/ce/ZX_Spectrum_128k.jpg",
                title: "ZX Spectrum 128 (1985) - El Modelo Radiador",
                tech: "Z80A @ 3.54 MHz | 128 KB RAM | Chip de sonido AY-3-8912.",
                curiosity: "Curiosidad: Desarrollado en gran parte en España por Investrónica debido a regulaciones del mercado español.",
                audioType: "game2"
            },
            {
                img: "https://upload.wikimedia.org/wikipedia/commons/a/a7/ZX_Spectrum_%2B2.jpg",
                title: "ZX Spectrum +2 (1986) - La Era Amstrad",
                tech: "128 KB RAM | Grabadora de casete ('Datacorder') integrada.",
                curiosity: "Curiosidad: Amstrad compró la marca y le añadió un teclado mecánico real imitando la fórmula del Amstrad CPC.",
                audioType: "game1"
            },
            {
                img: "https://upload.wikimedia.org/wikipedia/commons/d/d7/ZX_Spectrum_%2B3.jpg",
                title: "ZX Spectrum +3 (1987) - El Broche de Oro",
                tech: "128 KB RAM | Disquetera de 3 pulgadas integrada | +3DOS.",
                curiosity: "Curiosidad: Abandonó el casete por los discos de 3 pulgadas. Permitía cargar el sistema operativo profesional CP/M.",
                audioType: "game2"
            }
        ];

        let current = 0;
        let mainInterval = null;
        let progressInterval = null;
        let progressTime = 0;
        const durationPerModel = 10000; 

        // SINTETIZADOR DE AUDIO INTEGRADO (Web Audio API) - Evita bloqueos de red
        let audioCtx = null;
        let synthInterval = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function stopAudio() {
            if (synthInterval) clearInterval(synthInterval);
        }

        function playSynthSound(type) {
            stopAudio();
            initAudio();
            if(audioCtx.state === 'suspended') audioCtx.resume();

            if (type === "load") {
                // Simulación del mítico sonido de carga (ruido de espectro ruidoso)
                synthInterval = setInterval(() => {
                    let osc = audioCtx.createOscillator();
                    let gain = audioCtx.createGain();
                    osc.type = Math.random() > 0.5 ? 'square' : 'sawtooth';
                    osc.frequency.setValueAtTime(Math.random() * 800 + 400, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.03, audioCtx.currentTime); // volumen bajo para no molestar
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.05);
                }, 60);
            } else if (type === "game1") {
                // Melodía Chiptune Retro 1 (Inspirada en Manic Miner / Beep)
                let notes = [261, 293, 329, 349, 392, 440, 493, 523];
                let step = 0;
                synthInterval = setInterval(() => {
                    let osc = audioCtx.createOscillator();
                    let gain = audioCtx.createGain();
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(notes[step % notes.length], audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.2);
                    step++;
                }, 250);
            } else if (type === "game2") {
                // Melodía Chiptune Avanzada 2 (Estilo Chip AY de 128K)
                let notes = [440, 523, 587, 659, 587, 523, 440, 392];
                let step = 0;
                synthInterval = setInterval(() => {
                    let osc = audioCtx.createOscillator();
                    let gain = audioCtx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(notes[step % notes.length] * (step % 2 + 1), audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.15);
                    step++;
                }, 200);
            }
        }

        function showComputer(index) {
            current = index;
            const c = computers[current];
            
            // Actualizar interfaz
            const imgEl = document.getElementById('computer-img');
            imgEl.src = c.img;
            
            document.getElementById('info-text').innerHTML = `
                <strong>${c.title}</strong>
                <div class="tech-data"><strong>Especificaciones:</strong> ${c.tech}</div>
                <div class="curiosity">${c.curiosity}</div>
            `;
            
            // Lanzar sonido sintetizado dinámico
            playSynthSound(c.audioType);
        }

        function startShow() {
            stopShow();
            initAudio();
            showComputer(0);
            
            mainInterval = setInterval(() => {
                current = (current + 1) % computers.length;
                showComputer(current);
                progressTime = 0;
            }, durationPerModel);

            progressTime = 0;
            progressInterval = setInterval(() => {
                progressTime += 100;
                let percentage = (progressTime / durationPerModel) * 100;
                document.getElementById('progress').style.width = percentage + '%';
            }, 100);
        }

        function stopShow() {
            clearInterval(mainInterval);
            clearInterval(progressInterval);
            stopAudio();
            document.getElementById('progress').style.width = '0%';
        }
    </script>
</body>
</html>
